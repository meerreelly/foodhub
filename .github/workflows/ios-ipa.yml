name: iOS IPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-ios-ipa:
    name: Build unsigned iOS IPA
    runs-on: macos-15
    environment: main
    timeout-minutes: 45

    defaults:
      run:
        working-directory: food_hub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Disable Flutter Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Create .env
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          if [ -z "$DOTENV" ]; then
            echo "::error::Missing DOTENV secret. Add the full contents of food_hub/.env as a GitHub Actions secret named DOTENV in the main environment."
            exit 1
          fi

          printf '%s\n' "$DOTENV" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Prepare iOS build without code signing
        run: flutter build ios --release --config-only --no-codesign

      - name: Build iOS app without code signing
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/DerivedData/Build/Products/Release-iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qry ../FoodHub-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoodHub-unsigned-ipa
          path: food_hub/build/ios/FoodHub-unsigned.ipa
          if-no-files-found: error
