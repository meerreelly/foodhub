name: iOS IPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-ios-ipa:
    name: Build unsigned iOS IPA
    runs-on: macos-15
    timeout-minutes: 45

    defaults:
      run:
        working-directory: food_hub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: |
          if [ -z "$DOTENV" ]; then
            echo "::error::Missing DOTENV repository secret. Add the full contents of food_hub/.env as a GitHub Actions secret named DOTENV."
            exit 1
          fi

          printf '%s\n' "$DOTENV" > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build iOS app without code signing
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qry ../FoodHub-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoodHub-unsigned-ipa
          path: food_hub/build/ios/FoodHub-unsigned.ipa
          if-no-files-found: error
