name: food_hub
description: "FoodHub recipe search and meal planning app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: 6.2.0
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  firebase_storage: ^13.0.4
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^16.3.0
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  google_fonts: ^8.1.0
  liquid_glass_widgets: ^0.12.8
  path: ^1.9.1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  config:
    enable-swift-package-manager: false
  generate: true
  uses-material-design: true
  assets:
    - .env
